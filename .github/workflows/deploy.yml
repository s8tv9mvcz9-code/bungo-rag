name: Build & Deploy to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'requirements.txt'
      - 'Dockerfile'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure ログイン
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR ログイン
        run: az acr login --name bungoregistry

      - name: Docker ビルド & プッシュ
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t bungoregistry.azurecr.io/bungo-rag:latest \
            --push .

      - name: Container App デプロイ
        run: |
          az containerapp update \
            --name bungo-app \
            --resource-group bungo-rag-rg \
            --image bungoregistry.azurecr.io/bungo-rag:latest
