name: iOS CI
on:
  push: { paths: ["ios/**", ".github/workflows/ios-ci.yml"] }
  pull_request: { paths: ["ios/**"] }
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      # macos-14 ランナーの既定 Xcode は 15.4 だが、xcodegen が生成する
      # プロジェクトフォーマットはより新しい Xcode を要求することがある
      # （objectVersion 不一致で "future Xcode project file format" エラーになる）。
      # ランナーに同梱された最新の Xcode を動的に選択し、この不一致を吸収する。
      - name: Select latest available Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting: $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version
      - run: brew install xcodegen
      - working-directory: ios
        run: xcodegen generate
      - working-directory: ios
        # ビルド確認が目的で実機/特定シミュレータでの実行はしないため、
        # 'generic/platform=iOS Simulator' を使う。特定デバイス名+OS=latest だと
        # ランナー上に該当バージョンのシミュレータが存在せず失敗することがある
        # （例: iPhone 15 は OS 17.5 まで、OS=latest は 18.2 を指すため不一致）。
        run: >
          xcodebuild build
          -project BungoRag.xcodeproj -scheme BungoRag
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
