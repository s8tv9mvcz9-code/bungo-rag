name: Deploy Backend API

# 注意: このファイルは必ずブロックスタイル YAML で書くこと。
# 旧版はフロースタイル（with: { password: ${{ ... }} }）で書かれており、
# `${{ }}` の `}}` がフローマッピングを閉じてしまい workflow 全体が
# パース不能 → 全ブランチ・全 push で startup failure になっていた。
on:
  push:
    branches: [main]
    paths:
      # backend/** だと README 修正でも本番デプロイが走るため、実行物のみに絞る
      - "backend/main.py"
      - "backend/requirements.txt"
      - "backend/Dockerfile"
      - "app/rag.py"
      - "requirements.txt"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: # 手動再デプロイ・ロールバック用

# デプロイの並走で古い SHA が後勝ちしないよう直列化（キャンセルはしない）
concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMG: ghcr.io/s8tv9mvcz9-code/bungo-rag-api
      RG: bungo-rag-rg
      APP: bungo-api

    steps:
      - uses: actions/checkout@v4

      - name: ghcr.io ログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker ビルド & プッシュ
        run: |
          docker buildx build --platform linux/amd64 \
            -f backend/Dockerfile \
            -t "$IMG:${{ github.sha }}" -t "$IMG:latest" \
            --push .

      # Azure Container Apps は匿名 pull（＝public パッケージ前提）でイメージを引く。
      # 新規 ghcr パッケージは既定 private なので、public 化を忘れると
      # 「UNAUTHORIZED: authentication required」という分かりにくい失敗になる。
      # ここで匿名 pull 可否を先に検査し、未公開なら明快なガイドで即停止する。
      - name: ghcr パッケージが public か事前確認
        run: |
          set -euo pipefail
          PKG="s8tv9mvcz9-code/bungo-rag-api"
          TOKEN=$(curl -s "https://ghcr.io/token?scope=repository:${PKG}:pull&service=ghcr.io" | python3 -c "import sys,json;print(json.load(sys.stdin).get('token',''))")
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            "https://ghcr.io/v2/${PKG}/manifests/${{ github.sha }}")
          if [ "$CODE" != "200" ]; then
            echo "::error::ghcr パッケージ ${PKG} を匿名 pull できません (HTTP $CODE)。"
            echo "::error::GitHub の Profile → Packages → bungo-rag-api → Package settings → Change visibility → Public にしてから再実行してください（Web 用 bungo-rag と同じ public 運用）。"
            exit 1
          fi
          echo "✅ ${PKG} は public。Azure が匿名 pull 可能。"

      - name: Azure ログイン
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Container App デプロイ（bungo-app から env を複製・冪等/自己修復）
        run: |
          set -euo pipefail
          az extension add --name containerapp --yes --only-show-errors
          IMAGE="$IMG:${{ github.sha }}"

          # RAG 実行に必要な環境変数（Search/OpenAI/Chat のキー類）は .env にしか
          # 無いため、稼働中の bungo-app（Web）に注入済みの値を複製する。
          # create/update どちらの経路でも必ず全キーを設定する（＝前回 create が
          # イメージ pull 失敗で中途終了していても、再実行で完全な状態に収束する）。
          mapfile -t ENV_VARS < <(az containerapp show -n bungo-app -g "$RG" \
            --query "properties.template.containers[0].env[?value!=null].join('=',[name,value])" -o tsv)
          if [ "${#ENV_VARS[@]}" -eq 0 ]; then
            echo "::error::bungo-app から環境変数を複製できませんでした"; exit 1
          fi
          ENV_VARS+=("BUILD_SHA=${{ github.sha }}")

          if az containerapp show -n "$APP" -g "$RG" >/dev/null 2>&1; then
            echo "→ 既存 $APP を更新（イメージ＋全env）"
            az containerapp update -n "$APP" -g "$RG" \
              --image "$IMAGE" --set-env-vars "${ENV_VARS[@]}"
          else
            echo "→ $APP を新規作成"
            az containerapp create -n "$APP" -g "$RG" \
              --environment bungo-env \
              --image "$IMAGE" \
              --target-port 8000 \
              --ingress external \
              --min-replicas 0 --max-replicas 2 \
              --env-vars "${ENV_VARS[@]}"
          fi

      - name: /health 疎通ゲート（新リビジョンが応答するまで待つ）
        run: |
          set -euo pipefail
          FQDN=$(az containerapp show -n "$APP" -g "$RG" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "URL: https://$FQDN"
          # scale-to-zero のコールドスタートを考慮して最大 ~2 分ポーリング
          for i in $(seq 1 12); do
            BODY=$(curl -sf -m 20 "https://$FQDN/health" || true)
            echo "try $i: ${BODY:-<no response>}"
            if echo "$BODY" | grep -q '"status":"ok"' && echo "$BODY" | grep -q "${{ github.sha }}"; then
              echo "✅ 新リビジョン（${{ github.sha }}）が応答"
              exit 0
            fi
            sleep 10
          done
          echo "::error::/health が新リビジョンで応答しません"
          exit 1
