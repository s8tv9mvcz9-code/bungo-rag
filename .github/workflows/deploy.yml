name: Build & Deploy to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: # 手動再デプロイ用

# デプロイの並走で古い SHA が後勝ちしないよう直列化（キャンセルはしない）
concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # ghcr.io へ push するために必要
    env:
      # イメージは GitHub Container Registry（ghcr.io）へ。ACR Basic($5/月)は廃止。
      # パッケージは public 運用のため、Container App 側は認証情報なしで pull できる。
      IMAGE: ghcr.io/s8tv9mvcz9-code/bungo-rag

    steps:
      - uses: actions/checkout@v4

      - name: ghcr.io ログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker ビルド & プッシュ（SHA タグ）
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            --push .

      - name: Azure ログイン
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Container Apps 拡張機能インストール
        run: az extension add --name containerapp --yes --only-show-errors

      - name: Container App デプロイ（新リビジョン強制）
        run: |
          az containerapp update \
            --name bungo-app \
            --resource-group bungo-rag-rg \
            --image ${IMAGE}:${{ github.sha }}
