name: Eval CI
# 決定的リンタ・検索ヘルパの純関数テスト（依存ゼロ・LLM不使用・$0）。
# 品質ロードマップ 1-6 の「PRごとの回帰チェック」。秘密情報も外部通信も不要。
on:
  push: { paths: ["eval/**", "app/retrieval.py", "app/synesthesia.py", ".github/workflows/eval-ci.yml"] }
  pull_request: { paths: ["eval/**", "app/retrieval.py", "app/synesthesia.py", ".github/workflows/eval-ci.yml"] }
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Run eval unit tests
        run: |
          python eval/test_linter.py
          python eval/test_retrieval.py
          python eval/test_synesthesia.py
