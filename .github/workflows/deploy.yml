name: Build & Deploy to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'requirements.txt'
      - 'Dockerfile'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Azure ログイン
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Container Apps 拡張機能インストール
        run: az extension add --name containerapp --yes --only-show-errors

      - name: ACR ログイン
        run: az acr login --name bungoregistry

      - name: Docker ビルド & プッシュ（SHA タグ）
        run: |
          IMAGE=bungoregistry.azurecr.io/bungo-rag
          docker buildx build \
            --platform linux/amd64 \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            --push .

      - name: Container App デプロイ（新リビジョン強制）
        run: |
          az containerapp update \
            --name bungo-app \
            --resource-group bungo-rag-rg \
            --image bungoregistry.azurecr.io/bungo-rag:${{ github.sha }}
