org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true
org.gradle.configuration-cache=true

android.useAndroidX=true
android.nonTransitiveRClass=true

kotlin.code.style=official

# API のベースURL。既定は本番 bungo-api（iOS と同一）。
# ローカルのバックエンドに向ける場合は下記を上書きするか、ビルド時に
#   ./gradlew assembleDebug -PBUNGO_BASE_URL=http://10.0.2.2:8000
# を渡す（10.0.2.2 = Android エミュレータからホスト PC を指す特別アドレス）。
BUNGO_BASE_URL=https://bungo-api.gentleground-ba3d7ba2.japaneast.azurecontainerapps.io

# 関係者用の任意 API キー（既定は空＝公開レート枠）。関係者向けビルドでのみ設定:
#   ./gradlew assembleDebug -PBUNGO_API_KEY=<共有シークレット>
# 公開配布（android-latest）は空のまま。⚠ 値をここに書いてコミットしないこと（公開リポジトリ）。
BUNGO_API_KEY=
